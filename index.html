<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio of Amir Madoo — AI and backend developer building practical ML-powered systems with a strong focus on execution, reliability, and product impact."
    />
    <meta
      name="keywords"
      content="Amir, Flux, AI developer, system builder, portfolio, backend developer, AI systems"
    />
    <meta name="author" content="Amir" />
    <meta property="og:title" content="Amir Madoo | AI & Backend Developer" />
    <meta
      property="og:description"
      content="Explore Amir Madoo's projects in AI, ML, backend engineering, and data-driven product building."
    />
    <meta property="og:type" content="website" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <title>Amir Madoo | AI & Backend Developer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" id="sidebar" aria-label="Primary navigation">
        <div class="sidebar-header">
          <h1 class="brand">Amir | Flux</h1>
          <button
            class="close-sidebar"
            id="closeSidebar"
            aria-label="Close sidebar"
            type="button"
          >
            ✕
          </button>
        </div>

        <nav class="nav">
          <button class="nav-item" data-section="welcome" type="button">
            <span class="nav-icon"
              ><svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 3 3 10.5V21h6.2v-5.8h5.6V21H21V10.5L12 3Z"
                /></svg></span
            ><span>Welcome</span>
          </button>
          <button class="nav-item" data-section="flux" type="button">
            <span class="nav-icon"
              ><svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M3 14c2.3-4.3 5-6 8.3-6 3.1 0 5.4 1.5 7.7 5 1.1 1.7 2.1 2.5 4 3-1.3 1.9-3 2.9-5.2 2.9-2 0-3.5-.7-5-2.8-1.4-1.9-2.5-2.8-4.3-2.8-1.8 0-3.2.9-5.5 3.7Z"
                /></svg></span
            ><span>Flux</span>
          </button>
          <button class="nav-item" data-section="projects" type="button">
            <span class="nav-icon"
              ><svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M3 6.5h6.2l1.6 1.9H21v9.9A2.7 2.7 0 0 1 18.3 21H5.7A2.7 2.7 0 0 1 3 18.3V6.5Zm5.3 5.4L6.4 14l1.9 2 1.2-1.2-1-1.1 1-1-1.2-1.3Zm7.4 0-1.2 1.3 1 1-1 1.1 1.2 1.2 1.9-2-1.9-2.1Z"
                /></svg></span
            ><span>Projects</span>
          </button>
          <button class="nav-item" data-section="skills" type="button">
            <span class="nav-icon"
              ><svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M4 20V10h3v10H4Zm6 0V6h3v14h-3Zm6 0v-8h3v8h-3Z"
                /></svg></span
            ><span>Skills</span>
          </button>
          <button class="nav-item" data-section="about" type="button">
            <span class="nav-icon"
              ><svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 12a4.2 4.2 0 1 0 0-8.4A4.2 4.2 0 0 0 12 12Zm0 2.1c-4.1 0-7.6 2.2-8.8 5.3h17.6c-1.2-3.1-4.7-5.3-8.8-5.3Z"
                /></svg></span
            ><span>About</span>
          </button>
          <button class="nav-item" data-section="contact" type="button">
            <span class="nav-icon"
              ><svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M3 6.4A2.4 2.4 0 0 1 5.4 4h13.2A2.4 2.4 0 0 1 21 6.4v11.2a2.4 2.4 0 0 1-2.4 2.4H5.4A2.4 2.4 0 0 1 3 17.6V6.4Zm2.2.3 6.8 5.2 6.8-5.2H5.2Zm13.6 11V9.6l-6.1 4.7a1.2 1.2 0 0 1-1.4 0L5.2 9.6v8.1h13.6Z"
                /></svg></span
            ><span>Contact</span>
          </button>
          <button class="nav-item" data-section="resume" type="button">
            <span class="nav-icon"
              ><svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M6.8 3h7.9L20 8.3v11A1.7 1.7 0 0 1 18.3 21H6.8A1.7 1.7 0 0 1 5 19.3V4.7A1.7 1.7 0 0 1 6.8 3Zm7 1.9v3.4h3.4l-3.4-3.4ZM8 12h8v1.7H8V12Zm0 3.3h8V17H8v-1.7Z"
                /></svg></span
            ><span>Resume</span>
          </button>
          <button class="nav-item" data-section="coffee" type="button">
            <span class="nav-icon"
              ><svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M3 8.8A2.8 2.8 0 0 1 5.8 6h8.7a2.8 2.8 0 0 1 2.8 2.8v.2h1.9a2.8 2.8 0 1 1 0 5.6h-2A5.4 5.4 0 0 1 13 20H7.3A5.3 5.3 0 0 1 2 14.7V8.8Zm14.3 3.1v.5h1.8a1.4 1.4 0 1 0 0-2.8h-1.8v2.3Z"
                /></svg></span
            ><span>Coffee</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <button
            class="theme-toggle"
            id="themeToggle"
            type="button"
            aria-label="Toggle light or dark mode"
          >
            ☀️ Light mode
          </button>
        </div>
      </aside>

      <div
        class="sidebar-backdrop"
        id="sidebarBackdrop"
        aria-hidden="true"
      ></div>

      <main class="main" id="mainContent">
        <div class="social-links" aria-label="Social links">
          <a
            class="social-icon"
            href="https://github.com/amir-dev-flux"
            target="_blank"
            rel="noreferrer"
            aria-label="GitHub"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 2C6.48 2 2 6.58 2 12.24c0 4.53 2.87 8.38 6.84 9.73.5.1.68-.22.68-.49 0-.24-.01-.89-.01-1.75-2.78.62-3.37-1.37-3.37-1.37-.45-1.19-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.57 2.35 1.12 2.92.86.09-.67.35-1.12.64-1.38-2.22-.26-4.56-1.14-4.56-5.08 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.31.1-2.74 0 0 .84-.28 2.75 1.05A9.3 9.3 0 0 1 12 6.6c.85 0 1.71.12 2.5.35 1.9-1.33 2.74-1.05 2.74-1.05.55 1.43.2 2.48.1 2.74.65.72 1.03 1.63 1.03 2.75 0 3.95-2.34 4.82-4.57 5.07.36.32.68.95.68 1.92 0 1.39-.01 2.51-.01 2.85 0 .27.18.6.69.49A10.25 10.25 0 0 0 22 12.24C22 6.58 17.52 2 12 2Z"
              />
            </svg>
          </a>
          <a
            class="social-icon"
            href="https://www.linkedin.com/in/amir-dev-flux/"
            target="_blank"
            rel="noreferrer"
            aria-label="LinkedIn"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M6.94 8.5a1.72 1.72 0 1 1 0-3.44 1.72 1.72 0 0 1 0 3.44ZM8.5 10H5.38v9.5H8.5V10Zm4.96 0h-3v9.5h3v-5c0-1.32.25-2.6 1.88-2.6 1.61 0 1.63 1.52 1.63 2.68v4.92H21v-5.55c0-2.73-.57-4.83-3.7-4.83-1.5 0-2.5.87-2.9 1.7h-.04V10Z"
              />
            </svg>
          </a>
          <a
            class="social-icon"
            href="https://x.com/amirflux"
            target="_blank"
            rel="noreferrer"
            aria-label="X"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M18.9 2h3.3l-7.2 8.24L23.5 22h-6.7l-5.26-6.87L5.6 22H2.3l7.7-8.8L1.8 2h6.86l4.75 6.27L18.9 2Zm-1.17 17.96h1.85L7.67 3.95H5.7l12.03 16Z"
              />
            </svg>
          </a>

          <a
            class="social-icon"
            href="https://www.instagram.com/amir.dev.flux"
            target="_blank"
            rel="noreferrer"
            aria-label="Instagram"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5Zm0 2.2A2.8 2.8 0 0 0 4.2 7v10A2.8 2.8 0 0 0 7 19.8h10a2.8 2.8 0 0 0 2.8-2.8V7A2.8 2.8 0 0 0 17 4.2H7Zm11.1 1.7a1.2 1.2 0 1 1 0 2.4 1.2 1.2 0 0 1 0-2.4ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2.1a2.9 2.9 0 1 0 0 5.8 2.9 2.9 0 0 0 0-5.8Z"
              />
            </svg>
          </a>
        </div>

        <header class="main-header">
          <button
            class="menu-toggle"
            id="menuToggle"
            aria-label="Open sidebar"
            type="button"
          >
            ☰
          </button>
          <h2 id="sectionTitle">Welcome</h2>
        </header>

        <section
          class="chat-shell"
          aria-live="polite"
          aria-label="Section messages"
        >
          <div class="chat-thread" id="chatThread"></div>
        </section>

        <footer class="fake-input-bar" aria-label="Simulated input area">
          <input
            id="fakeInput"
            class="fake-input"
            type="text"
            placeholder="Use the prompts above to navigate"
            readonly
            aria-readonly="true"
          />
          <button class="fake-send" type="button" aria-label="Send" disabled>
            ➤
          </button>
        </footer>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
